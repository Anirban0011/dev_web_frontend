name: Login Flow Test
on:
  push:
    branches: [ "test/**" ]

jobs:
  login-flow-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
      LOCALHOST: ${{ vars.LOCALHOST }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      VITE_BACKEND_BASE_URI: ${{ vars.VITE_BACKEND_BASE_URI }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install
      - run: npx playwright install --with-deps
      - run: npx wait-on ${{ vars.VITE_BACKEND_BASE_URI }}
      - run: npm run dev &
      - run: npx wait-on ${{ vars.LOCALHOST }}
      - run: npx playwright test tests/login.test.js
  create-pr:
    needs: login-flow-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
        run: |
          gh pr create \
            --title "Auto PR: ${{ github.ref_name }}" \
            --body "Automated PR created because Playwright login tests passed." \
            --base master \
            --head ${{ github.ref_name }}
          gh pr merge --auto --squash "${{ github.ref_name }}"